name: LiveLog CI

on:
  push:
    paths:
      - "live-log-app/**"
      - ".github/workflows/live-log-ci.yml"
  pull_request:
    paths:
      - "live-log-app/**"
      - ".github/workflows/live-log-ci.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: live-log-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: live-log-app/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - run: npm test
      - run: npx --yes firebase-tools@15.24.0 emulators:exec --project demo-livelog --only firestore --config firebase.json "npm run test:rules"
      - run: npm run typecheck
      - run: npm run build
